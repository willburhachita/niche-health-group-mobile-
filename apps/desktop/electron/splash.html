<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 420px; height: 320px;
    overflow: hidden;
    background: transparent;
    font-family: -apple-system, 'Segoe UI', sans-serif;
    -webkit-app-region: no-drag;
  }
  .card {
    width: 100%; height: 100%;
    background: linear-gradient(145deg, #1B2B6B 0%, #2D4A9E 60%, #3B5BBE 100%);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .logo-wrap {
    width: 90px; height: 90px;
    background: rgba(255,255,255,0.12);
    border-radius: 24px;
    display: flex; align-items: center; justify-content: center;
    animation: pulse 2s ease-in-out infinite;
  }
  .logo-wrap img { width: 64px; height: 64px; object-fit: contain; }
  .title {
    color: #fff;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .subtitle {
    color: rgba(255,255,255,0.65);
    font-size: 13px;
    font-weight: 400;
    margin-top: -12px;
  }
  .progress-track {
    width: 180px; height: 3px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 8px;
  }
  .progress-bar {
    height: 100%; width: 0;
    background: rgba(255,255,255,0.85);
    border-radius: 2px;
    animation: load 2.2s ease-in-out forwards;
  }
  .version {
    position: absolute;
    bottom: 18px;
    color: rgba(255,255,255,0.35);
    font-size: 11px;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }
  @keyframes load {
    0%   { width: 0%; }
    30%  { width: 45%; }
    70%  { width: 75%; }
    100% { width: 100%; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="../public/logo.png" onerror="this.style.display='none'" />
    </div>
    <div class="title">NHL Connect</div>
    <div class="subtitle">Niche Healthcare Limited</div>
    <div class="progress-track">
      <div class="progress-bar"></div>
    </div>
    <div class="version">v1.0.0</div>
  </div>
</body>
</html>
